<!-- Bento Card Template used in app.js -->
<article class="p-6 border border-gray-100 rounded-xl bg-white shadow-sm hover:shadow-md hover:border-accent transition-all duration-300 flex flex-col h-full clickable-card cursor-pointer group">
  <div class="mb-4">
    <span class="bg-gray-100 text-gray-600 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider" data-acf-field="meta_category">CATEGORIE</span>
  </div>
  <h3 class="font-bold text-xl mb-2 group-hover:text-accent transition-colors" data-acf-field="card_title">Titel van het item</h3>
  <p class="text-sm text-gray-600 flex-grow line-clamp-2" data-acf-field="card_excerpt">Korte beschrijving die maximaal over twee regels loopt...</p>
  <div class="mt-6 pt-4 border-t border-gray-50 flex justify-between items-center text-xs text-gray-400">
    <span data-acf-field="card_date">01 Maart 2026</span>
    <span class="font-bold text-accent group-hover:translate-x-1 transition-transform">→</span>
  </div>
</article>
